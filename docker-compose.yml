services:
  # 1. De MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
    # Create configuration on the fly
    entrypoint: [ "sh", "-c" ]
    command: >
      "echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
      echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
      /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - gateway_net

  # 2. De Database
  influxdb:
    image: kobedm/my-influxdb:final
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - gateway_net

  # 3. De Verwerking
  nodered:
    image: kobedm/my-nodered:final
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - node_red_data:/data
    networks:
      - gateway_net
    depends_on:
      - mosquitto
      - influxdb

  # 4. Python App
  sensor_app:
    # Use the pre-built image from Docker Hub
    image: kobedm/sensor-app:v1
    restart: unless-stopped
    networks:
      - gateway_net
    depends_on:
      - mosquitto

  # 5. Beheer
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - gateway_net

  # 6. Grafana dashboard
  grafana:
    image: kobedm/my-grafana:final
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gateway_net
    depends_on:
      - influxdb

networks:
  gateway_net:
    driver: bridge

volumes:
  influxdb_data:
  node_red_data:
  grafana_data:
  portainer_data:  