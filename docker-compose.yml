services:

  # ── Init: write Node-RED flows into the named volume ──────────────────────
  init_nodered:
    image: alpine:3.20
    restart: "no"
    environment:
      FLOWS_B64: ""
    command: >-
      sh -c "[ -f /data/flows.json ] || (echo \"$$FLOWS_B64\" | base64 -d > /data/flows.json && chown 1000:1000 /data/flows.json && echo 'flows.json written')"
    volumes:
      - node_red_data:/data

  # ── Init: write Grafana provisioning + dashboard into the named volume ─────
  init_grafana:
    image: alpine:3.20
    restart: "no"
    environment:
      DS_B64: ""
      PROV_B64: "YXBpVmVyc2lvbjogMQpwcm92aWRlcnM6CiAgLSBuYW1lOiBTZW5zb3IgRGFzaGJvYXJkcwogICAgdHlwZTogZmlsZQogICAgZGlzYWJsZURlbGV0aW9uOiBmYWxzZQogICAgdXBkYXRlSW50ZXJ2YWxTZWNvbmRzOiAxMAogICAgYWxsb3dVaVVwZGF0ZXM6IHRydWUKICAgIG9wdGlvbnM6CiAgICAgIHBhdGg6IC92YXIvbGliL2dyYWZhbmEvZGFzaGJvYXJkcwo="
      DASH_B64: ""
    command: >-
      sh -c "mkdir -p /gf/provisioning/datasources /gf/provisioning/dashboards /gf/dashboards &&
      echo \"$$DS_B64\"   | base64 -d > /gf/provisioning/datasources/influxdb.yaml &&
      echo \"$$PROV_B64\" | base64 -d > /gf/provisioning/dashboards/default.yaml &&
      echo \"$$DASH_B64\" | base64 -d > /gf/dashboards/sensor.json &&
      chown -R 472:472 /gf &&
      echo 'Grafana config written'"
    volumes:
      - grafana_data:/gf

  # ── 1. MQTT Broker ─────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1884:1883"
    entrypoint: ["sh", "-c"]
    command: >-
      "echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
      echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
      /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - gateway_net

  # ── 2. Time-series Database ─────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    ports:
      - "8087:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: sensors
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mytoken123
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - gateway_net

  # ── 3. Data Processing ──────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    restart: unless-stopped
    ports:
      - "1881:1880"
    environment:
      TZ: Europe/Brussels
    volumes:
      - node_red_data:/data
    networks:
      - gateway_net
    depends_on:
      init_nodered:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_started

  # ── 4. Dashboard ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: adminpassword
      GF_PATHS_PROVISIONING: /var/lib/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gateway_net
    depends_on:
      init_grafana:
        condition: service_completed_successfully
      influxdb:
        condition: service_started

  # ── 5. Container Management ─────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9444:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - gateway_net

networks:
  gateway_net:
    driver: bridge

volumes:
  influxdb_data:
  node_red_data:
  grafana_data:
  portainer_data:
