services:
  # 0. One-time data seeders (run only when volume is empty)
  init_influxdb:
    image: kobedm/my-influxdb:final
    restart: "no"
    command: >
      sh -c "if [ -z \"$$(ls -A /target 2>/dev/null)\" ]; then
      cp -a /var/lib/influxdb2/. /target/ &&
      chown -R 1000:1000 /target;
      fi"
    volumes:
      - influxdb_data:/target

  init_nodered:
    image: kobedm/my-nodered:final
    restart: "no"
    command: >
      sh -c "if [ -z \"$$(ls -A /target 2>/dev/null)\" ]; then
      cp -a /data/. /target/ &&
      chown -R 1000:1000 /target;
      fi"
    volumes:
      - node_red_data:/target

  init_grafana:
    image: kobedm/my-grafana:final
    restart: "no"
    command: >
      sh -c "if [ -z \"$$(ls -A /target 2>/dev/null)\" ]; then
      cp -a /var/lib/grafana/. /target/ &&
      chown -R 472:472 /target;
      fi"
    volumes:
      - grafana_data:/target

  # 1. De MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
    # Create configuration on the fly
    entrypoint: [ "sh", "-c" ]
    command: >
      "echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
      echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
      /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - gateway_net

  # 2. De Database
  influxdb:
    image: kobedm/my-influxdb:final
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-admin12345}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-cloudopdracht}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-sensors}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-cloudopdracht-super-token-please-change}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - gateway_net
    depends_on:
      init_influxdb:
        condition: service_completed_successfully

  # 3. De Verwerking
  nodered:
    image: kobedm/my-nodered:final
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - node_red_data:/data
    networks:
      - gateway_net
    depends_on:
      init_nodered:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_started

  # 4. Python App
  sensor_app:
    # Uses the pre-built image from Docker Hub
    image: kobedm/sensor-app:v1
    restart: unless-stopped
    networks:
      - gateway_net
    depends_on:
      - mosquitto

  # 5. Beheer
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - gateway_net

  # 6. Grafana dashboard
  grafana:
    image: kobedm/my-grafana:final
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gateway_net
    depends_on:
      init_grafana:
        condition: service_completed_successfully
      influxdb:
        condition: service_started

networks:
  gateway_net:
    driver: bridge

volumes:
  influxdb_data:
    name: cloudopdracht_influxdb_data
  node_red_data:
    name: cloudopdracht_node_red_data
  grafana_data:
    name: cloudopdracht_grafana_data
  portainer_data:  